    <h3>秋天的故事</h3>
    <p>秋天，又称秋季，一年四季的第三季，由夏季到冬季的过度季，天文为秋分到冬至。<br>自然景观最明显的变化在树木上面，城市里会开始清扫大量的落叶，山区则涌进不少欣赏红叶的旅客们。</p>
    <p>进入秋季，北方冷空气不断侵入，但势力不会很强，常在北方形成秋高气爽的天气，华西常有绵绵秋雨出现。<br>总体来讲，进入秋季，太阳高度角渐低，温度渐降；秋风送爽,炎暑顿消,硕果满枝，田野金黄。</p>
